name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w" -o deployd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/deployd

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: deployd-${{ matrix.goos }}-${{ matrix.goarch }}
